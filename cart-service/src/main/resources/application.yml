# Server
server:
  port: 8082

spring:
  application:
    name: cart-service

  # Database (MYSQL)
  datasource:
    url: jdbc:mysql://localhost:3306/ECOMMERCE_CART
    username: root
    password: Fabulous1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Product service URL
product:
  service:
    url: http://localhost:8081

# Inventory service URL
inventory:
  service:
    url: http://localhost:8084
  
  # Enable Feign logging for debugging
#logging.level.com.ecommerce.cartservice.client=DEBUG