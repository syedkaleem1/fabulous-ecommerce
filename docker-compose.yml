## ─────────────────────────────────────────────────────────────────────────────
## ShopForge Microservices
##
## Network topology:
##   Internet → api-gateway:8000 (public)
##                  ↓ routes + forwards X-User-* headers
##              order-service:8081 (internal)
##                  ↓ HTTP                    ↓ HTTP
##          inventory-service:8082      payment-service:8083
##               (internal)                  (internal)
##
## Each service has its OWN MySQL database — no shared schemas.
## Ports 8081/8082/8083 are on the internal Docker network only.
## Only port 8000 (gateway) needs to be exposed to the internet.
## ─────────────────────────────────────────────────────────────────────────────
